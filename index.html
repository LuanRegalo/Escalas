<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala de Trabalho</title>
    <style>
        :root {
            --bg-base: #0a0a0a; --bg-sidebar: #111111; --bg-card: #1a1a1a; --bg-table: #1a1a1a;
            --bg-input: #2a2a2a; --color-primary: #6b7280; --gradient-primary: linear-gradient(135deg, #4b5563 0%, #1f2937 100%);
            --gradient-sidebar: linear-gradient(180deg, #1f1f1f 0%, #0a0a0a 100%);
            --text-primary: #f5f5f5; --text-secondary: #a0a0a0; --text-muted: #707070;
            --border-subtle: rgba(255,255,255,0.08); --border-active: #6b7280;
            --nav-active-bg: rgba(255,255,255,0.08); --nav-hover-bg: rgba(255,255,255,0.05);
            --cell-hover-bg: rgba(255,255,255,0.08); --cell-hover-border: #6b7280;
            --weekend-col-text: #d1d5db; --weekend-bg: rgba(30,30,30,0.5);
            --weekend-header-bg: rgba(30,30,30,0.9); --weekend-header-border: rgba(255,255,255,0.15);
            --shadow-card: 0 8px 32px rgba(0,0,0,0.6); --radius-lg: 16px; --radius-md: 12px; --radius-sm: 8px;
            --transition: 0.25s; --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font-sans); background:var(--bg-base); color:var(--text-primary); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:16px; }
        .app-shell { display:flex; width:100%; max-width:1500px; min-height:90vh; background:rgba(20,20,20,0.6); backdrop-filter:blur(18px); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-card), 0 0 0 1px var(--border-subtle); }
        .sidebar { width:300px; background:var(--gradient-sidebar); padding:32px 20px 20px; display:flex; flex-direction:column; border-right:1px solid var(--border-subtle); flex-shrink:0; overflow-y:auto; }
        .sidebar-header { margin-bottom:24px; }
        .sidebar-logo { font-size:1.6rem; font-weight:800; color:#fff; }
        .sidebar-nav { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
        .nav-item { display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:var(--radius-sm); font-weight:600; font-size:0.9rem; color:var(--text-secondary); cursor:pointer; transition:all var(--transition); border:1px solid transparent; background:transparent; }
        .nav-item:hover { background:var(--nav-hover-bg); border-color:rgba(255,255,255,0.15); color:#fff; }
        .nav-item.active { background:var(--nav-active-bg); border-color:var(--border-active); color:#fff; }
        .badge { margin-left:auto; background:rgba(255,255,255,0.15); color:#f5f5f5; font-size:0.7rem; padding:2px 10px; border-radius:20px; }
        .calendario-section, .dia-selector-section, .sem-folga-section, .theme-selector { margin-top:16px; padding-top:12px; border-top:1px solid var(--border-subtle); }
        label { font-size:0.7rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; display:block; margin-bottom:8px; }
        .calendar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
        .calendar-month-year { font-weight:600; font-size:0.9rem; color:var(--text-primary); }
        .calendar-nav-btn { background:var(--bg-input); border:1px solid var(--border-subtle); color:var(--text-primary); border-radius:4px; padding:4px 8px; cursor:pointer; font-size:0.8rem; }
        .calendar-nav-btn:hover { background:rgba(255,255,255,0.1); border-color:var(--border-active); }
        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; text-align:center; font-size:0.7rem; }
        .calendar-day-name { font-weight:600; color:var(--text-muted); padding:4px 0; }
        .calendar-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:4px; cursor:pointer; background:rgba(255,255,255,0.03); color:var(--text-secondary); }
        .calendar-day:hover { background:rgba(255,255,255,0.1); color:#fff; }
        .calendar-day.today { border:1px solid var(--border-active); font-weight:700; color:#fff; }
        .calendar-day.selected { background:var(--border-active); color:#fff; }
        .calendar-day.other-month { color:rgba(255,255,255,0.15); pointer-events:none; }
        .calendar-day.feriado { background:rgba(251,191,36,0.2); color:#fbbf24; border:1px solid rgba(251,191,36,0.5); }
        .calendar-day.comemorativa { background:rgba(244,114,182,0.2); color:#f472b6; border:1px solid rgba(244,114,182,0.5); }
        .calendar-day.feriado.today { border:2px solid #fbbf24; }
        .calendar-day.comemorativa.today { border:2px solid #f472b6; }
        .calendar-day.feriado.selected { background:#fbbf24; color:#000; }
        .calendar-day.comemorativa.selected { background:#f472b6; color:#000; }
        .feriado-info { margin-top:4px; font-size:0.7rem; color:#fbbf24; text-align:center; min-height:16px; }
        .comemorativa-info { margin-top:2px; font-size:0.7rem; color:#f472b6; text-align:center; min-height:16px; }
        select { width:100%; padding:8px 12px; background:var(--bg-input); border:1px solid var(--border-subtle); border-radius:var(--radius-sm); color:#fff; font-size:0.85rem; cursor:pointer; }
        .funcionarios-dia-lista, .funcionarios-sem-folga-lista { margin-top:10px; max-height:150px; overflow-y:auto; }
        .funcionario-dia-item, .funcionario-sem-folga-item { padding:6px 10px; margin-bottom:4px; background:rgba(255,255,255,0.03); border-radius:6px; font-size:0.8rem; border-left:3px solid var(--border-active); }
        .funcionario-sem-folga-item.destacado-vermelho { color:#ef4444 !important; background:rgba(239,68,68,0.15); border-left-color:#ef4444; }
        .btn-limpar-vermelhos { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.4); color:#fca5a5; padding:2px 8px; border-radius:4px; font-size:0.6rem; cursor:pointer; }
        .theme-options { display:flex; gap:6px; }
        .theme-dot { width:24px; height:24px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
        .theme-dot.active { border-color:#fff; box-shadow:0 0 10px currentColor; }
        .sidebar-footer { margin-top:auto; font-size:0.75rem; color:var(--text-muted); text-align:center; padding-top:16px; border-top:1px solid var(--border-subtle); }

        .main-content { flex:1; display:flex; flex-direction:column; padding:28px 24px 20px; overflow-x:hidden; }
        .main-header { margin-bottom:16px; }
        .header-top { display:flex; justify-content:flex-end; margin-bottom:8px; }
        .action-buttons { display:flex; gap:6px; }
        .escala-title-section { width:100%; }
        .escala-title-box { background:rgba(255,255,255,0.03); border:1px solid var(--border-subtle); border-radius:var(--radius-sm); padding:10px 20px; font-weight:700; font-size:1.1rem; color:#fff; cursor:pointer; text-align:center; }
        .escala-title-box:hover { border-color:var(--border-active); background:rgba(255,255,255,0.05); }
        .escala-title-input { background:var(--bg-input); border:1px solid var(--border-active); border-radius:var(--radius-sm); padding:10px 16px; font-weight:700; font-size:1.1rem; color:#fff; outline:none; text-align:center; width:100%; }

        .btn-minimal {
            background:transparent; border:1px solid rgba(255,255,255,0.08); color:rgba(255,255,255,0.25);
            padding:4px 8px; font-size:0.8rem; border-radius:4px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:2px;
        }
        .btn-minimal:hover { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.2); color:rgba(255,255,255,0.8); }
        .btn-minimal-danger { border-color:rgba(239,68,68,0.08); color:rgba(239,68,68,0.3); }
        .btn-minimal-danger:hover { background:rgba(239,68,68,0.08); border-color:rgba(239,68,68,0.3); color:#f87171; }

        .table-container { flex:1; overflow-x:auto; border-radius:var(--radius-md); border:1px solid var(--border-subtle); background:var(--bg-table); }
        table { width:100%; border-collapse:collapse; min-width:800px; font-size:0.85rem; }
        tbody td { padding:0 8px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.05); vertical-align:middle; height:60px; }
        tbody td:first-child { text-align:left; padding-left:20px; font-weight:600; }
        .cell-display { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; padding:10px 6px; border-radius:6px; min-width:60px; border:1px solid transparent; transition:all var(--transition); }
        .cell-display:hover { background:var(--cell-hover-bg); border-color:var(--cell-hover-border); transform:scale(1.03); }
        /* NOVA COR LARANJA PARA FOLGA */
        .cell-display.folga {
            background: rgba(255, 165, 0, 0.25);
            border-color: rgba(255, 165, 0, 0.5);
        }
        .cell-dia { font-weight:600; font-size:0.8rem; }
        .cell-folga-text {
            font-weight:700;
            font-size:0.75rem;
            color:#000;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:2px;
        }

        .delete-func-btn {
            background:none; border:none; color:rgba(255,255,255,0.2); cursor:pointer; font-size:0.9rem; padding:2px 4px; border-radius:3px; margin-left:auto; opacity:0; transition:opacity 0.2s, color 0.2s;
        }
        tbody tr:hover .delete-func-btn { opacity:1; }
        .delete-func-btn:hover { color:#ef4444; background:rgba(239,68,68,0.1); }

        .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }

        dialog { border:none; border-radius:var(--radius-md); padding:0; box-shadow:0 0 40px rgba(0,0,0,0.8); max-width:500px; width:92%; background:var(--bg-card); color:#fff; }
        dialog::backdrop { background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); }
        .modal-content { padding:28px; }
        .modal-content h2 { font-size:1.3rem; font-weight:700; margin-bottom:20px; }
        .modal-content input { width:100%; padding:10px 14px; border:1.5px solid var(--border-subtle); border-radius:6px; font-size:0.9rem; background:var(--bg-input); color:#fff; }
        .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }
        .btn { padding:8px 16px; border-radius:6px; font-weight:600; font-size:0.85rem; cursor:pointer; border:none; }
        .btn-primary { background:var(--color-primary); color:#fff; }
        .btn-outline { background:transparent; border:1px solid var(--border-subtle); color:var(--text-secondary); }
        .toast { position:fixed; bottom:28px; right:28px; background:var(--bg-card); color:#fff; padding:14px 24px; border-radius:8px; font-weight:600; z-index:999; opacity:0; transform:translateY(20px); transition:0.3s; pointer-events:none; border:1px solid var(--border-active); }
        .toast.show { opacity:1; transform:translateY(0); }
        .emoji-input { font-size:1.5rem; text-align:center; width:80px; }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-header"><div class="sidebar-logo">Escala</div></div>
        <div class="sidebar-nav" id="sidebarNav"></div>
        <div class="calendario-section">
            <label>📅 Calendário</label>
            <div class="calendar-header">
                <button class="calendar-nav-btn" id="prevMonthBtn">◀</button>
                <span class="calendar-month-year" id="calendarMonthYear"></span>
                <button class="calendar-nav-btn" id="nextMonthBtn">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="dia-semana-indicator" id="diaSemanaIndicador"></div>
            <div class="feriado-info" id="feriadoInfo"></div>
            <div class="comemorativa-info" id="comemorativaInfo"></div>
        </div>
        <div class="dia-selector-section">
            <label>🏠 Quem está na casa?</label>
            <select id="diaSelecionado" onchange="atualizarListaDia()">
                <option value="seg">Segunda-feira</option><option value="ter">Terça-feira</option><option value="qua">Quarta-feira</option>
                <option value="qui">Quinta-feira</option><option value="sex">Sexta-feira</option><option value="sab">Sábado</option><option value="dom">Domingo</option>
            </select>
            <div class="funcionarios-dia-lista" id="listaFuncionariosDia"></div>
        </div>
        <div class="sem-folga-section">
            <div class="sem-folga-header">
                <label>✅ Sem Nenhuma Folga</label>
                <button class="btn-limpar-vermelhos" onclick="limparDestaquesVermelhos()">🧹 Limpar</button>
            </div>
            <div class="funcionarios-sem-folga-lista" id="listaFuncionariosSemFolga"></div>
        </div>
        <div class="theme-selector">
            <label>Tema da Escala</label>
            <div class="theme-options" id="themeOptions">
                <div class="theme-dot" data-theme="verde" style="background:#10b981;" title="Verde"></div>
                <div class="theme-dot" data-theme="azul" style="background:#3b82f6;" title="Azul"></div>
                <div class="theme-dot" data-theme="preto" style="background:#1f1f1f;" title="Preto"></div>
            </div>
        </div>
        <div class="sidebar-footer"><p>Escala · v1.0</p></div>
    </aside>

    <main class="main-content">
        <div class="main-header">
            <div class="header-top">
                <div class="action-buttons">
                    <button class="btn-minimal" onclick="abrirModalAdicionar()" title="Adicionar Funcionário">+</button>
                    <button class="btn-minimal btn-minimal-danger" onclick="limparEscalaAtual()" title="Limpar Escala">🗑</button>
                </div>
            </div>
            <div class="escala-title-section">
                <div class="escala-title-box" id="escalaTituloDisplay" onclick="abrirModalEditarEscala()">
                    <span id="tituloTexto"></span>
                </div>
            </div>
        </div>
        <div class="table-container">
            <table id="tabelaEscala">
                <tbody id="corpoTabela"></tbody>
            </table>
            <div class="empty-state" id="estadoVazio"><span class="icon">📭</span><p><strong>Nenhum funcionário nesta escala</strong></p><p>Adicione funcionários para começar.</p></div>
        </div>
    </main>
</div>

<dialog id="modalAdicionar">
    <div class="modal-content">
        <h2>👤 Novo Funcionário</h2>
        <div style="display:flex; flex-direction:column; gap:16px;">
            <div><label>Nome completo</label><input type="text" id="inputNome" placeholder="Ex: Maria Silva"></div>
            <p style="font-size:0.75rem;color:var(--text-muted);">💡 Pressione Enter para adicionar rapidamente. Clique nas células para alternar folga.</p>
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="fecharModalAdicionar()">Cancelar</button>
            <button class="btn btn-primary" onclick="adicionarFuncionario()">✅ Adicionar</button>
        </div>
    </div>
</dialog>

<dialog id="modalEditarEscala">
    <div class="modal-content">
        <h2>✏️ Editar Escala</h2>
        <div style="display:flex; flex-direction:column; gap:16px;">
            <div><label>Nome da Escala</label><input type="text" id="inputEscalaNome" placeholder="Nome da escala"></div>
            <div><label>Emoji</label><input type="text" id="inputEscalaEmoji" class="emoji-input" placeholder="📅" maxlength="4"></div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="fecharModalEditarEscala()">Cancelar</button>
            <button class="btn btn-primary" onclick="salvarEdicaoEscala()">💾 Salvar</button>
        </div>
    </div>
</dialog>

<div class="toast" id="toast"></div>

<script>
(function() {
    const DIAS = ['seg','ter','qua','qui','sex','sab','dom'];
    const DIAS_ABREVIADOS = {'seg':'Seg','ter':'Ter','qua':'Qua','qui':'Qui','sex':'Sex','sab':'Sáb','dom':'Dom'};
    const NOMES_DIAS = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
    const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const NUM_ESCALAS = 5;
    const STORAGE_KEY = 'escala_trabalho_feriados_v5';

    // Cores de destaque por tema
    const CORES_TEMA = {
        verde: { bg: '#064e3b', text: '#ffffff' },
        azul:  { bg: '#1e3a8a', text: '#ffffff' },
        preto: { bg: '#ffffff', text: '#000000' }
    };

    const TEMAS = {
        verde: { bgBase:'#0a140f', bgSidebar:'#0f1914', bgCard:'#132419', bgTable:'#132419', bgInput:'#1d3324', colorPrimary:'#10b981', gradientPrimary:'linear-gradient(135deg, #059669, #064e3b)', gradientSidebar:'linear-gradient(180deg, #152e21, #0a140f)', borderActive:'#10b981', cellHoverBg:'rgba(16,185,129,0.12)', cellHoverBorder:'#10b981', weekendColText:'#6ee7b7', weekendBg:'rgba(15,30,20,0.5)', weekendHeaderBg:'rgba(15,30,20,0.9)', weekendHeaderBorder:'rgba(16,185,129,0.25)' },
        azul: { bgBase:'#0a0f1a', bgSidebar:'#0f1629', bgCard:'#141f33', bgTable:'#141f33', bgInput:'#1e2d47', colorPrimary:'#3b82f6', gradientPrimary:'linear-gradient(135deg, #2563eb, #1e3a8a)', gradientSidebar:'linear-gradient(180deg, #162240, #0a0f1a)', borderActive:'#3b82f6', cellHoverBg:'rgba(59,130,246,0.12)', cellHoverBorder:'#3b82f6', weekendColText:'#93c5fd', weekendBg:'rgba(20,30,50,0.5)', weekendHeaderBg:'rgba(20,30,50,0.9)', weekendHeaderBorder:'rgba(59,130,246,0.25)' },
        preto: { bgBase:'#0a0a0a', bgSidebar:'#111111', bgCard:'#1a1a1a', bgTable:'#1a1a1a', bgInput:'#2a2a2a', colorPrimary:'#6b7280', gradientPrimary:'linear-gradient(135deg, #4b5563, #1f2937)', gradientSidebar:'linear-gradient(180deg, #1f1f1f, #0a0a0a)', borderActive:'#6b7280', cellHoverBg:'rgba(255,255,255,0.08)', cellHoverBorder:'#6b7280', weekendColText:'#d1d5db', weekendBg:'rgba(30,30,30,0.5)', weekendHeaderBg:'rgba(30,30,30,0.9)', weekendHeaderBorder:'rgba(255,255,255,0.15)' }
    };

    let escalas = [];
    let escalaAtiva = 0;
    let diaSelecionadoLista = 'seg';
    let selectedDate = new Date();
    let currentMonth = selectedDate.getMonth();
    let currentYear = selectedDate.getFullYear();
    const destaqueVermelho = new Set();

    function gerarId() { return 'f'+Date.now()+Math.random().toString(36).substr(2,7); }
    function salvar() { localStorage.setItem(STORAGE_KEY, JSON.stringify(escalas)); }
    function getEscalaAtiva() { return escalas[escalaAtiva]?.funcionarios || []; }
    function getTituloAtivo() { return escalas[escalaAtiva]?.titulo || 'Escala'; }
    function getEmojiAtivo() { return escalas[escalaAtiva]?.emoji || '📅'; }
    function getTemaAtivo() { return escalas[escalaAtiva]?.tema || 'preto'; }
    function escHtml(str) { var d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

    function getCorDia() {
        return CORES_TEMA[getTemaAtivo()] || CORES_TEMA['preto'];
    }

    function pascoa(ano) { var a=ano%19,b=Math.floor(ano/100),c=ano%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1; return new Date(ano,month-1,day); }
    function segundoDomingo(mes, ano) { var d=new Date(ano,mes-1,1); var diaSemana=d.getDay(); var diasAteDomingo=diaSemana===0?0:7-diaSemana; var segundoDom=1+diasAteDomingo+7; return segundoDom; }

    function gerarFeriados(ano) {
        var p=pascoa(ano),c=new Date(p); c.setDate(c.getDate()-47);
        var corpus=new Date(p); corpus.setDate(corpus.getDate()+60);
        return [
            {dia:1,mes:1,nome:'Confraternização Universal',tipo:'feriado'},
            {dia:21,mes:4,nome:'Tiradentes',tipo:'feriado'},
            {dia:1,mes:5,nome:'Dia do Trabalho',tipo:'feriado'},
            {dia:7,mes:9,nome:'Independência do Brasil',tipo:'feriado'},
            {dia:12,mes:10,nome:'Nossa Sra. Aparecida',tipo:'feriado'},
            {dia:2,mes:11,nome:'Finados',tipo:'feriado'},
            {dia:15,mes:11,nome:'Proclamação da República',tipo:'feriado'},
            {dia:25,mes:12,nome:'Natal',tipo:'feriado'},
            {dia:2,mes:7,nome:'Independência da Bahia',tipo:'feriado'},
            {dia:2,mes:2,nome:'Nossa Sra. dos Navegantes',tipo:'feriado'},
            {dia:29,mes:3,nome:'Fundação de Salvador',tipo:'feriado'},
            {dia:4,mes:12,nome:'Santa Bárbara',tipo:'feriado'},
            {dia:c.getDate(),mes:c.getMonth()+1,nome:'Carnaval',tipo:'feriado'},
            {dia:p.getDate(),mes:p.getMonth()+1,nome:'Páscoa',tipo:'feriado'},
            {dia:corpus.getDate(),mes:corpus.getMonth()+1,nome:'Corpus Christi',tipo:'feriado'}
        ];
    }

    function gerarDatasComemorativas(ano) {
        var diaMaes = segundoDomingo(5, ano);
        var diaPais = segundoDomingo(8, ano);
        return [
            {dia:diaMaes,mes:5,nome:'Dia das Mães',tipo:'comemorativa'},
            {dia:12,mes:6,nome:'Dia dos Namorados',tipo:'comemorativa'},
            {dia:20,mes:7,nome:'Dia do Amigo',tipo:'comemorativa'},
            {dia:diaPais,mes:8,nome:'Dia dos Pais',tipo:'comemorativa'},
            {dia:15,mes:10,nome:'Dia do Professor',tipo:'comemorativa'},
            {dia:28,mes:10,nome:'Dia do Servidor Público',tipo:'comemorativa'},
            {dia:31,mes:10,nome:'Halloween',tipo:'comemorativa'},
            {dia:24,mes:12,nome:'Véspera de Natal',tipo:'comemorativa'},
            {dia:31,mes:12,nome:'Réveillon',tipo:'comemorativa'}
        ];
    }

    function obterDataEspecial(date) {
        var feriados = gerarFeriados(date.getFullYear());
        var comemorativas = gerarDatasComemorativas(date.getFullYear());
        var f = feriados.find(x=>x.dia===date.getDate() && x.mes===date.getMonth()+1);
        if (f) return f;
        var c = comemorativas.find(x=>x.dia===date.getDate() && x.mes===date.getMonth()+1);
        return c || null;
    }

    function carregar() {
        try {
            var raw = localStorage.getItem(STORAGE_KEY);
            var data = raw ? JSON.parse(raw) : null;
            if (!Array.isArray(data)) throw new Error('inválido');
            while(data.length < NUM_ESCALAS) data.push({titulo:'Escala '+(data.length+1), tema:'preto', emoji:'📅', funcionarios:[]});
            if(data.length > NUM_ESCALAS) data.splice(NUM_ESCALAS);
            escalas = data.map((item,i)=>({titulo:item.titulo||('Escala '+(i+1)), tema:item.tema||'preto', emoji:item.emoji||'📅', funcionarios:Array.isArray(item.funcionarios)?item.funcionarios:[]}));
        }catch(e){ demo(); }
    }
    function demo() {
        var aD={}, cD={}, rD={};
        DIAS.forEach(d=>{ aD[d]={folga: d==='sab'||d==='dom'}; cD[d]={folga: d==='dom'}; rD[d]={folga: d==='sab'||d==='dom'}; });
        escalas=[
            {titulo:'Setor Administrativo',tema:'azul',emoji:'📋',funcionarios:[{id:gerarId(),nome:'Ana Costa',dias:aD},{id:gerarId(),nome:'Carlos Mendes',dias:cD}]},
            {titulo:'Setor de Transporte',tema:'verde',emoji:'🚚',funcionarios:[{id:gerarId(),nome:'Roberto Alves',dias:rD}]},
            {titulo:'Escala 3',tema:'preto',emoji:'🍣',funcionarios:[]},
            {titulo:'Escala 4',tema:'azul',emoji:'🍳',funcionarios:[]},
            {titulo:'Escala 5',tema:'verde',emoji:'👨‍🍳',funcionarios:[]}
        ];
        salvar();
    }

    function aplicarTema(nome) {
        var t = TEMAS[nome] || TEMAS['preto'];
        var r = document.documentElement;
        r.style.setProperty('--bg-base',t.bgBase); r.style.setProperty('--bg-sidebar',t.bgSidebar); r.style.setProperty('--bg-card',t.bgCard); r.style.setProperty('--bg-table',t.bgTable);
        r.style.setProperty('--bg-input',t.bgInput); r.style.setProperty('--color-primary',t.colorPrimary); r.style.setProperty('--gradient-primary',t.gradientPrimary);
        r.style.setProperty('--gradient-sidebar',t.gradientSidebar); r.style.setProperty('--border-active',t.borderActive); r.style.setProperty('--cell-hover-bg',t.cellHoverBg);
        r.style.setProperty('--cell-hover-border',t.cellHoverBorder); r.style.setProperty('--weekend-col-text',t.weekendColText); r.style.setProperty('--weekend-bg',t.weekendBg);
        r.style.setProperty('--weekend-header-bg',t.weekendHeaderBg); r.style.setProperty('--weekend-header-border',t.weekendHeaderBorder);
    }

    function renderizarTudo() {
        aplicarTema(getTemaAtivo());
        document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active', d.dataset.theme===getTemaAtivo()));
        renderizarSidebar();
        document.getElementById('tituloTexto').textContent = getEmojiAtivo() + ' ' + getTituloAtivo();
        renderizarTabela();
        renderizarCalendario();
        atualizarDiaCalendario();
        renderizarListaSemFolga();
    }

    function renderizarSidebar() {
        var nav = document.getElementById('sidebarNav'); nav.innerHTML='';
        escalas.forEach((esc,i)=>{
            var btn = document.createElement('button');
            btn.className = 'nav-item' + (i===escalaAtiva?' active':'');
            btn.innerHTML = esc.emoji + ' ' + escHtml(esc.titulo) + ' <span class="badge">'+esc.funcionarios.length+'</span>';
            btn.onclick = function(){ escalaAtiva=i; renderizarTudo(); mostrarToast(esc.emoji + ' ' + getTituloAtivo()); };
            nav.appendChild(btn);
        });
    }

    function renderizarTabela() {
        var tbody = document.getElementById('corpoTabela'), vazio = document.getElementById('estadoVazio');
        var funcs = getEscalaAtiva();
        if(!funcs.length){ tbody.innerHTML=''; vazio.style.display='block'; return; }
        vazio.style.display='none';
        var corDia = getCorDia();
        tbody.innerHTML = funcs.map(f=>{
            var diasHtml = DIAS.map(dia=>{
                var d = f.dias&&f.dias[dia] ? f.dias[dia] : {folga:false};
                if(d.folga) return '<td><div class="cell-display folga" onclick="window.toggleFolga(\''+f.id+'\',\''+dia+'\')"><span class="cell-folga-text">FOLGA<br>🏖️</span></div></td>';
                return '<td><div class="cell-display" style="background-color:' + corDia.bg + '; color:' + corDia.text + ';" onclick="window.toggleFolga(\''+f.id+'\',\''+dia+'\')"><span class="cell-dia">'+DIAS_ABREVIADOS[dia]+'</span></div></td>';
            }).join('');
            return '<tr><td>'+escHtml(f.nome)+'<button class="delete-func-btn" onclick="window.removerFunc(\''+f.id+'\')">✕</button></td>'+diasHtml+'</tr>';
        }).join('');
    }

    function renderizarListaDia() {
        var container = document.getElementById('listaFuncionariosDia'), dia = diaSelecionadoLista;
        var trabalhando = getEscalaAtiva().filter(f=>{ var d=f.dias&&f.dias[dia]?f.dias[dia]:{folga:false}; return !d.folga; });
        container.innerHTML = trabalhando.length ? trabalhando.map(f=>'<div class="funcionario-dia-item">'+escHtml(f.nome)+'</div>').join('') : '<div class="nenhum-funcionario">Nenhum funcionário na casa</div>';
    }

    function renderizarListaSemFolga() {
        var container = document.getElementById('listaFuncionariosSemFolga');
        var semFolga = getEscalaAtiva().filter(f=>!DIAS.some(d=>{ var dd=f.dias&&f.dias[d]?f.dias[d]:{folga:false}; return dd.folga; }));
        if(!semFolga.length){ container.innerHTML='<div class="nenhum-funcionario">Todos têm folga</div>'; return; }
        container.innerHTML = semFolga.map(f=>'<div class="funcionario-sem-folga-item'+(destaqueVermelho.has(f.id)?' destacado-vermelho':'')+'" data-id="'+f.id+'">'+escHtml(f.nome)+'</div>').join('');
        container.querySelectorAll('.funcionario-sem-folga-item').forEach(el=>{
            el.addEventListener('dblclick', function(e){ e.stopPropagation(); var id=this.dataset.id; destaqueVermelho.has(id)?destaqueVermelho.delete(id):destaqueVermelho.add(id); this.classList.toggle('destacado-vermelho'); });
        });
    }

    function renderizarCalendario() {
        var grid=document.getElementById('calendarGrid'), my=document.getElementById('calendarMonthYear');
        if(!grid||!my) return;
        var y=currentYear, m=currentMonth;
        var firstDay=new Date(y,m,1).getDay(), daysInMonth=new Date(y,m+1,0).getDate();
        var today=new Date(), todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
        var selStr=selectedDate.getFullYear()+'-'+String(selectedDate.getMonth()+1).padStart(2,'0')+'-'+String(selectedDate.getDate()).padStart(2,'0');
        my.textContent = MESES[m]+' '+y;
        grid.innerHTML='';
        ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d=>{ var div=document.createElement('div'); div.className='calendar-day-name'; div.textContent=d; grid.appendChild(div); });
        var prevDays=new Date(y,m,0).getDate();
        for(var i=firstDay-1;i>=0;i--){ var div=document.createElement('div'); div.className='calendar-day other-month'; div.textContent=prevDays-i; grid.appendChild(div); }
        for(let day=1;day<=daysInMonth;day++){
            let date=new Date(y,m,day), dateStr=y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
            let especial=obterDataEspecial(date), div=document.createElement('div'); div.className='calendar-day'; div.textContent=day;
            if(dateStr===todayStr) div.classList.add('today');
            if(dateStr===selStr) div.classList.add('selected');
            if(especial){
                if(especial.tipo==='feriado') div.classList.add('feriado');
                else if(especial.tipo==='comemorativa') div.classList.add('comemorativa');
                div.title=especial.nome;
            }
            div.addEventListener('click',function(){ selectedDate=new Date(y,m,day); renderizarTudo(); });
            grid.appendChild(div);
        }
        var total=firstDay+daysInMonth, rem=7-(total%7);
        if(rem<7) for(var i=1;i<=rem;i++){ var div=document.createElement('div'); div.className='calendar-day other-month'; div.textContent=i; grid.appendChild(div); }
        var espSel=obterDataEspecial(selectedDate);
        var fi=document.getElementById('feriadoInfo'), ci=document.getElementById('comemorativaInfo');
        if(fi) fi.textContent = (espSel && espSel.tipo==='feriado') ? '🏖️ '+espSel.nome : '';
        if(ci) ci.textContent = (espSel && espSel.tipo==='comemorativa') ? '🎉 '+espSel.nome : '';
    }
    function atualizarDiaCalendario(){
        var ds=DIAS[selectedDate.getDay()===0?6:selectedDate.getDay()-1]; diaSelecionadoLista=ds;
        document.getElementById('diaSelecionado').value=ds;
        document.getElementById('diaSemanaIndicador').textContent=NOMES_DIAS[selectedDate.getDay()];
        renderizarListaDia();
    }
    function navegarMes(delta){ currentMonth+=delta; if(currentMonth>11){currentMonth=0;currentYear++;} else if(currentMonth<0){currentMonth=11;currentYear--;} renderizarTudo(); }
    document.getElementById('prevMonthBtn').addEventListener('click',function(){ navegarMes(-1); });
    document.getElementById('nextMonthBtn').addEventListener('click',function(){ navegarMes(1); });

    window.atualizarListaDia = function(){ diaSelecionadoLista=document.getElementById('diaSelecionado').value; renderizarListaDia(); };
    window.limparDestaquesVermelhos = function(){ destaqueVermelho.clear(); renderizarListaSemFolga(); mostrarToast('🧹 Destaques removidos!'); };
    window.abrirModalAdicionar = function(){
        var modal=document.getElementById('modalAdicionar'); if(!modal) return;
        document.getElementById('inputNome').value='';
        if(modal.showModal) modal.showModal(); else modal.setAttribute('open','true');
        setTimeout(function(){ document.getElementById('inputNome').focus(); },120);
    };
    window.fecharModalAdicionar = function(){ var m=document.getElementById('modalAdicionar'); if(m){ if(m.close)m.close(); else m.removeAttribute('open'); } };
    window.adicionarFuncionario = function(){
        var nome=document.getElementById('inputNome').value.trim();
        if(!nome){ mostrarToast('⚠️ Informe o nome.'); return; }
        var dias={}; DIAS.forEach(d=>{ dias[d]={folga:false}; });
        getEscalaAtiva().push({id:gerarId(),nome,dias});
        salvar(); renderizarTudo(); fecharModalAdicionar(); mostrarToast('✅ Funcionário adicionado!');
    };
    window.limparEscalaAtual = function(){
        if(!confirm('Limpar todos os funcionários de "'+getTituloAtivo()+'"?')) return;
        getEscalaAtiva().forEach(f=>destaqueVermelho.delete(f.id));
        escalas[escalaAtiva].funcionarios=[]; salvar(); renderizarTudo(); mostrarToast('🧹 Escala limpa.');
    };

    window.abrirModalEditarEscala = function(){
        var modal = document.getElementById('modalEditarEscala');
        if(!modal) return;
        document.getElementById('inputEscalaNome').value = getTituloAtivo();
        document.getElementById('inputEscalaEmoji').value = getEmojiAtivo();
        if(modal.showModal) modal.showModal(); else modal.setAttribute('open','true');
        setTimeout(function(){ document.getElementById('inputEscalaNome').focus(); },120);
    };
    window.fecharModalEditarEscala = function(){
        var m = document.getElementById('modalEditarEscala');
        if(m){ if(m.close)m.close(); else m.removeAttribute('open'); }
    };
    window.salvarEdicaoEscala = function(){
        var nome = document.getElementById('inputEscalaNome').value.trim();
        var emoji = document.getElementById('inputEscalaEmoji').value.trim() || '📅';
        if(!nome){ mostrarToast('⚠️ Informe o nome da escala.'); return; }
        escalas[escalaAtiva].titulo = nome;
        escalas[escalaAtiva].emoji = emoji;
        salvar(); renderizarTudo(); fecharModalEditarEscala(); mostrarToast('✏️ Escala atualizada!');
    };

    window.toggleFolga = function(funcId, dia){
        var func = getEscalaAtiva().find(f=>f.id===funcId); if(!func) return;
        if(!func.dias) func.dias={};
        var estado = func.dias[dia] ? func.dias[dia].folga : false;
        func.dias[dia] = {folga: !estado};
        salvar(); renderizarTudo();
        mostrarToast(estado ? '🔄 Folga removida!' : '🏖️ Folga marcada!');
    };
    window.removerFunc = function(funcId){
        if(!confirm('Remover este funcionário?')) return;
        escalas[escalaAtiva].funcionarios = getEscalaAtiva().filter(f=>f.id!==funcId);
        destaqueVermelho.delete(funcId); salvar(); renderizarTudo(); mostrarToast('🗑️ Funcionário removido.');
    };
    function mostrarToast(msg){
        var t=document.getElementById('toast'); if(!t) return;
        t.textContent=msg; t.classList.add('show'); clearTimeout(t._timeout);
        t._timeout=setTimeout(function(){t.classList.remove('show');},2600);
    }

    document.querySelectorAll('.theme-dot').forEach(dot=>{
        dot.addEventListener('click', function(){
            var novoTema = this.dataset.theme;
            if(novoTema && novoTema!==getTemaAtivo()){
                escalas[escalaAtiva].tema = novoTema;
                salvar(); aplicarTema(novoTema);
                document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active', d.dataset.theme===novoTema));
                mostrarToast('🎨 Tema alterado para '+novoTema+'!');
                renderizarTudo();
            }
        });
    });

    document.getElementById('modalAdicionar').addEventListener('click', function(e){ if(e.target===this) fecharModalAdicionar(); });
    document.getElementById('modalEditarEscala').addEventListener('click', function(e){ if(e.target===this) fecharModalEditarEscala(); });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            var modalAdicionar = document.getElementById('modalAdicionar');
            var modalEditar = document.getElementById('modalEditarEscala');
            if (modalEditar && (modalEditar.hasAttribute('open') || modalEditar.open)) {
                return;
            }
            if (modalAdicionar && (modalAdicionar.hasAttribute('open') || modalAdicionar.open)) {
                e.preventDefault();
                window.adicionarFuncionario();
            } else {
                var active = document.activeElement;
                if (!active || (active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA')) {
                    e.preventDefault();
                    window.abrirModalAdicionar();
                }
            }
        }
    });

    carregar();
    selectedDate = new Date(); currentMonth = selectedDate.getMonth(); currentYear = selectedDate.getFullYear();
    renderizarTudo();
})();
</script>
</body>
</html>
