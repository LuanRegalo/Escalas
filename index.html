<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala de Trabalho</title>
    <style>
        :root {
            --bg-base: #121212; --bg-sidebar: #1a1a1a; --bg-card: #1e1e1e; --bg-table: #1a1a1a;
            --bg-input: #2a2a2a; --color-primary: #888888; --text-primary: #e0e0e0;
            --text-secondary: #aaaaaa; --text-muted: #888888;
            --border-subtle: rgba(255,255,255,0.05); --border-active: #666666;
            --nav-active-bg: rgba(255,255,255,0.05); --nav-hover-bg: rgba(255,255,255,0.03);
            --cell-hover-bg: rgba(255,255,255,0.05); --cell-hover-border: #666666;
            --weekend-col-text: #cccccc; --weekend-bg: rgba(30,30,30,0.3);
            --weekend-header-bg: rgba(30,30,30,0.5); --weekend-header-border: rgba(255,255,255,0.08);
            --shadow-card: none; --radius-lg: 8px; --radius-md: 6px; --radius-sm: 4px;
            --transition: 0.2s ease; --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font-sans); background:var(--bg-base); color:var(--text-primary); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:12px; }
        .app-shell { display:flex; width:100%; max-width:1300px; min-height:90vh; background:var(--bg-card); border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--border-subtle); }
        .sidebar { width:240px; background:var(--bg-sidebar); padding:20px 16px 16px; display:flex; flex-direction:column; border-right:1px solid var(--border-subtle); flex-shrink:0; overflow-y:auto; }
        .sidebar-header { margin-bottom:16px; }
        .sidebar-logo { font-size:1.3rem; font-weight:600; color:var(--text-primary); }
        .sidebar-nav { display:flex; flex-direction:column; gap:3px; margin-bottom:12px; }
        .nav-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:var(--radius-sm); font-weight:500; font-size:0.8rem; color:var(--text-secondary); cursor:pointer; transition:all var(--transition); border:1px solid transparent; background:transparent; }
        .nav-item:hover { background:var(--nav-hover-bg); border-color:var(--border-subtle); color:var(--text-primary); }
        .nav-item.active { background:var(--nav-active-bg); border-color:var(--border-active); color:var(--text-primary); }
        .badge { margin-left:auto; background:rgba(255,255,255,0.08); color:var(--text-secondary); font-size:0.65rem; padding:1px 6px; border-radius:10px; }
        .calendario-section, .dia-selector-section, .sem-folga-section, .theme-selector { margin-top:12px; padding-top:8px; border-top:1px solid var(--border-subtle); }
        label { font-size:0.65rem; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; display:block; margin-bottom:4px; }
        .calendar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
        .calendar-month-year { font-weight:500; font-size:0.75rem; color:var(--text-primary); }
        .calendar-nav-btn { background:var(--bg-input); border:1px solid var(--border-subtle); color:var(--text-secondary); border-radius:3px; padding:2px 6px; cursor:pointer; font-size:0.7rem; }
        .calendar-nav-btn:hover { background:rgba(255,255,255,0.05); border-color:var(--border-active); color:var(--text-primary); }
        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; text-align:center; font-size:0.6rem; }
        .calendar-day-name { font-weight:500; color:var(--text-muted); padding:2px 0; }
        .calendar-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:3px; cursor:pointer; background:rgba(255,255,255,0.02); color:var(--text-secondary); }
        .calendar-day:hover { background:rgba(255,255,255,0.08); color:var(--text-primary); }
        .calendar-day.today { border:1px solid var(--border-active); font-weight:600; color:var(--text-primary); }
        .calendar-day.selected { background:var(--border-active); color:#fff; }
        .calendar-day.other-month { color:rgba(255,255,255,0.1); pointer-events:none; }
        .calendar-day.feriado { background:rgba(251,191,36,0.15); color:#fbbf24; border:1px solid rgba(251,191,36,0.3); }
        .calendar-day.comemorativa { background:rgba(244,114,182,0.15); color:#f472b6; border:1px solid rgba(244,114,182,0.3); }
        .feriado-info, .comemorativa-info { margin-top:2px; font-size:0.6rem; text-align:center; min-height:12px; }
        select { width:100%; padding:6px 8px; background:var(--bg-input); border:1px solid var(--border-subtle); border-radius:var(--radius-sm); color:var(--text-primary); font-size:0.75rem; cursor:pointer; }
        .funcionarios-dia-lista, .funcionarios-sem-folga-lista { margin-top:6px; max-height:120px; overflow-y:auto; }
        .funcionario-dia-item, .funcionario-sem-folga-item { padding:4px 8px; margin-bottom:2px; background:rgba(255,255,255,0.02); border-radius:3px; font-size:0.75rem; border-left:2px solid var(--border-active); }
        .funcionario-sem-folga-item.destacado-vermelho { color:#ef4444 !important; background:rgba(239,68,68,0.1); border-left-color:#ef4444; }
        .btn-limpar-vermelhos { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#fca5a5; padding:2px 5px; border-radius:3px; font-size:0.55rem; cursor:pointer; }
        .theme-options { display:flex; gap:5px; }
        .theme-dot { width:18px; height:18px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
        .theme-dot.active { border-color:var(--text-primary); }
        .sidebar-footer { margin-top:auto; font-size:0.65rem; color:var(--text-muted); text-align:center; padding-top:10px; border-top:1px solid var(--border-subtle); }

        .main-content { flex:1; display:flex; flex-direction:column; padding:16px 14px 12px; overflow-x:hidden; }
        .main-header { margin-bottom:10px; }
        .header-top { display:flex; justify-content:flex-end; margin-bottom:4px; }
        .action-buttons { display:flex; gap:3px; }
        .escala-title-section { width:100%; }
        .escala-title-box { background:rgba(255,255,255,0.02); border:1px solid var(--border-subtle); border-radius:var(--radius-sm); padding:6px 12px; font-weight:500; font-size:0.9rem; color:var(--text-primary); cursor:pointer; text-align:center; }
        .escala-title-box:hover { border-color:var(--border-active); background:rgba(255,255,255,0.03); }
        .escala-title-input { background:var(--bg-input); border:1px solid var(--border-active); border-radius:var(--radius-sm); padding:6px 12px; font-weight:500; font-size:0.9rem; color:var(--text-primary); outline:none; text-align:center; width:100%; }

        /* BLOCO DE NOTAS INLINE */
        .anotacao-container {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .anotacao-container label {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .anotacao-textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 0.8rem;
            font-family: 'Courier New', 'Consolas', monospace;
            color: var(--text-primary);
            line-height: 1.5;
            resize: vertical;
            min-height: 80px;
            transition: border-color var(--transition);
        }
        .anotacao-textarea:focus {
            border-color: var(--border-active);
            outline: none;
        }
        .anotacao-textarea::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        .btn-minimal {
            background:transparent; border:1px solid rgba(255,255,255,0.06); color:rgba(255,255,255,0.3);
            padding:2px 6px; font-size:0.7rem; border-radius:3px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:1px;
        }
        .btn-minimal:hover { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.15); color:rgba(255,255,255,0.8); }
        .btn-minimal-danger { border-color:rgba(239,68,68,0.1); color:rgba(239,68,68,0.3); }
        .btn-minimal-danger:hover { background:rgba(239,68,68,0.05); border-color:rgba(239,68,68,0.3); color:#f87171; }

        .table-container { flex:1; overflow-x:auto; border-radius:var(--radius-md); border:1px solid var(--border-subtle); background:var(--bg-table); }
        table { width:100%; border-collapse:collapse; min-width:700px; font-size:0.75rem; }
        tbody td { padding:0 6px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle; height:40px; }
        tbody td:first-child { text-align:left; padding-left:14px; font-weight:500; }
        .cell-display { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; cursor:pointer; padding:4px 4px; border-radius:4px; min-width:50px; border:1px solid transparent; transition:all var(--transition); }
        .cell-display:hover { background:var(--cell-hover-bg); border-color:var(--cell-hover-border); }
        .cell-display.folga { background:rgba(255,165,0,0.15); border-color:rgba(255,165,0,0.3); }
        .cell-display.ferias { background:rgba(147,51,234,0.15); border-color:rgba(147,51,234,0.3); }
        .cell-dia { font-weight:500; font-size:0.7rem; }
        .cell-folga-text { font-weight:600; font-size:0.65rem; color:#ffa500; display:flex; flex-direction:column; align-items:center; gap:1px; }
        .cell-ferias-text { font-weight:600; font-size:0.65rem; color:#c084fc; display:flex; flex-direction:column; align-items:center; gap:1px; }

        .delete-func-btn {
            background:none; border:none; color:rgba(255,255,255,0.2); cursor:pointer; font-size:0.8rem; padding:1px 3px; border-radius:3px; margin-left:auto; opacity:0; transition:opacity 0.2s, color 0.2s;
        }
        tbody tr:hover .delete-func-btn { opacity:1; }
        .delete-func-btn:hover { color:#ef4444; background:rgba(239,68,68,0.1); }

        .empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:0.8rem; }

        dialog { border:none; border-radius:var(--radius-md); padding:0; box-shadow:0 0 30px rgba(0,0,0,0.7); max-width:400px; width:92%; background:var(--bg-card); color:var(--text-primary); }
        dialog::backdrop { background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); }
        .modal-content { padding:20px; }
        .modal-content h2 { font-size:1.1rem; font-weight:600; margin-bottom:16px; }
        .modal-content input { width:100%; padding:8px 10px; border:1.5px solid var(--border-subtle); border-radius:4px; font-size:0.85rem; background:var(--bg-input); color:var(--text-primary); }
        .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
        .btn { padding:6px 12px; border-radius:4px; font-weight:500; font-size:0.8rem; cursor:pointer; border:none; }
        .btn-primary { background:var(--color-primary); color:#fff; }
        .btn-outline { background:transparent; border:1px solid var(--border-subtle); color:var(--text-secondary); }
        .toast { position:fixed; bottom:20px; right:20px; background:var(--bg-card); color:var(--text-primary); padding:10px 18px; border-radius:6px; font-weight:500; z-index:999; opacity:0; transform:translateY(10px); transition:0.3s; pointer-events:none; border:1px solid var(--border-active); font-size:0.8rem; }
        .toast.show { opacity:1; transform:translateY(0); }
        .emoji-input { font-size:1.2rem; text-align:center; width:60px; }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-header"><div class="sidebar-logo">Escala</div></div>
        <div class="sidebar-nav" id="sidebarNav"></div>
        <div class="calendario-section">
            <label>📅 Calendário</label>
            <div class="calendar-header">
                <button class="calendar-nav-btn" id="prevMonthBtn">◀</button>
                <span class="calendar-month-year" id="calendarMonthYear"></span>
                <button class="calendar-nav-btn" id="nextMonthBtn">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="dia-semana-indicator" id="diaSemanaIndicador"></div>
            <div class="feriado-info" id="feriadoInfo"></div>
            <div class="comemorativa-info" id="comemorativaInfo"></div>
        </div>
        <div class="dia-selector-section">
            <label>🏠 Quem está na casa?</label>
            <select id="diaSelecionado" onchange="atualizarListaDia()">
                <option value="seg">Segunda-feira</option><option value="ter">Terça-feira</option><option value="qua">Quarta-feira</option>
                <option value="qui">Quinta-feira</option><option value="sex">Sexta-feira</option><option value="sab">Sábado</option><option value="dom">Domingo</option>
            </select>
            <div class="funcionarios-dia-lista" id="listaFuncionariosDia"></div>
        </div>
        <div class="sem-folga-section">
            <div class="sem-folga-header">
                <label>✅ Sem Nenhuma Folga</label>
                <button class="btn-limpar-vermelhos" onclick="limparDestaquesVermelhos()">🧹 Limpar</button>
            </div>
            <div class="funcionarios-sem-folga-lista" id="listaFuncionariosSemFolga"></div>
        </div>
        <div class="theme-selector">
            <label>Tema da Escala</label>
            <div class="theme-options" id="themeOptions">
                <div class="theme-dot" data-theme="verde" style="background:#10b981;" title="Verde"></div>
                <div class="theme-dot" data-theme="azul" style="background:#3b82f6;" title="Azul"></div>
                <div class="theme-dot" data-theme="preto" style="background:#1f1f1f;" title="Preto"></div>
            </div>
        </div>
        <div class="sidebar-footer"><p>Escala · v3.0</p></div>
    </aside>

    <main class="main-content">
        <div class="main-header">
            <div class="header-top">
                <div class="action-buttons">
                    <button class="btn-minimal" onclick="abrirModalAdicionar()" title="Adicionar Funcionário">+</button>
                    <button class="btn-minimal" onclick="limparTodasFolgas()" title="Limpar Todas as Folgas e Férias">🔄</button>
                    <button class="btn-minimal btn-minimal-danger" onclick="limparEscalaAtual()" title="Limpar Escala">🗑</button>
                </div>
            </div>
            <div class="escala-title-section">
                <div class="escala-title-box" id="escalaTituloDisplay" onclick="abrirModalEditarEscala()">
                    <span id="tituloTexto"></span>
                </div>
            </div>
        </div>
        <div class="table-container">
            <table id="tabelaEscala">
                <tbody id="corpoTabela"></tbody>
            </table>
            <div class="empty-state" id="estadoVazio"><span class="icon">📭</span><p><strong>Nenhum funcionário nesta escala</strong></p><p>Adicione funcionários para começar.</p></div>
        </div>

        <!-- Bloco de notas editável inline -->
        <div class="anotacao-container">
            <label>📝 Bloco de Notas</label>
            <textarea
                id="anotacaoTextarea"
                class="anotacao-textarea"
                placeholder="Escreva suas observações, lembretes ou informações importantes..."
            ></textarea>
        </div>
    </main>
</div>

<dialog id="modalAdicionar">
    <div class="modal-content">
        <h2>👤 Novo Funcionário</h2>
        <div style="display:flex; flex-direction:column; gap:12px;">
            <div><label>Nome completo</label><input type="text" id="inputNome" placeholder="Ex: Maria Silva"></div>
            <p style="font-size:0.7rem;color:var(--text-muted);">💡 Pressione Enter para adicionar rapidamente. Clique único = Folga | Duplo clique = Férias.</p>
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="fecharModalAdicionar()">Cancelar</button>
            <button class="btn btn-primary" onclick="adicionarFuncionario()">✅ Adicionar</button>
        </div>
    </div>
</dialog>

<dialog id="modalEditarEscala">
    <div class="modal-content">
        <h2>✏️ Editar Escala</h2>
        <div style="display:flex; flex-direction:column; gap:12px;">
            <div><label>Nome da Escala</label><input type="text" id="inputEscalaNome" placeholder="Nome da escala"></div>
            <div><label>Emoji</label><input type="text" id="inputEscalaEmoji" class="emoji-input" placeholder="📅" maxlength="4"></div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="fecharModalEditarEscala()">Cancelar</button>
            <button class="btn btn-primary" onclick="salvarEdicaoEscala()">💾 Salvar</button>
        </div>
    </div>
</dialog>

<div class="toast" id="toast"></div>

<script>
(function() {
    const DIAS = ['seg','ter','qua','qui','sex','sab','dom'];
    const DIAS_ABREVIADOS = {'seg':'Seg','ter':'Ter','qua':'Qua','qui':'Qui','sex':'Sex','sab':'Sáb','dom':'Dom'};
    const NOMES_DIAS = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
    const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const NUM_ESCALAS = 5;
    const STORAGE_KEY = 'escala_trabalho_feriados_v5';

    const CORES_TEMA = {
        verde: { bg: '#064e3b', text: '#ffffff' },
        azul:  { bg: '#1e3a8a', text: '#ffffff' },
        preto: { bg: '#ffffff', text: '#000000' }
    };

    const TEMAS = {
        verde: { bgBase:'#0a140f', bgSidebar:'#0f1914', bgCard:'#132419', bgTable:'#132419', bgInput:'#1d3324', colorPrimary:'#10b981', gradientPrimary:'linear-gradient(135deg, #059669, #064e3b)', gradientSidebar:'linear-gradient(180deg, #152e21, #0a140f)', borderActive:'#10b981', cellHoverBg:'rgba(16,185,129,0.12)', cellHoverBorder:'#10b981', weekendColText:'#6ee7b7', weekendBg:'rgba(15,30,20,0.5)', weekendHeaderBg:'rgba(15,30,20,0.9)', weekendHeaderBorder:'rgba(16,185,129,0.25)' },
        azul: { bgBase:'#0a0f1a', bgSidebar:'#0f1629', bgCard:'#141f33', bgTable:'#141f33', bgInput:'#1e2d47', colorPrimary:'#3b82f6', gradientPrimary:'linear-gradient(135deg, #2563eb, #1e3a8a)', gradientSidebar:'linear-gradient(180deg, #162240, #0a0f1a)', borderActive:'#3b82f6', cellHoverBg:'rgba(59,130,246,0.12)', cellHoverBorder:'#3b82f6', weekendColText:'#93c5fd', weekendBg:'rgba(20,30,50,0.5)', weekendHeaderBg:'rgba(20,30,50,0.9)', weekendHeaderBorder:'rgba(59,130,246,0.25)' },
        preto: { bgBase:'#0a0a0a', bgSidebar:'#111111', bgCard:'#1a1a1a', bgTable:'#1a1a1a', bgInput:'#2a2a2a', colorPrimary:'#6b7280', gradientPrimary:'linear-gradient(135deg, #4b5563, #1f2937)', gradientSidebar:'linear-gradient(180deg, #1f1f1f, #0a0a0a)', borderActive:'#6b7280', cellHoverBg:'rgba(255,255,255,0.08)', cellHoverBorder:'#6b7280', weekendColText:'#d1d5db', weekendBg:'rgba(30,30,30,0.5)', weekendHeaderBg:'rgba(30,30,30,0.9)', weekendHeaderBorder:'rgba(255,255,255,0.15)' }
    };

    let escalas = [];
    let escalaAtiva = 0;
    let diaSelecionadoLista = 'seg';
    let selectedDate = new Date();
    let currentMonth = selectedDate.getMonth();
    let currentYear = selectedDate.getFullYear();
    const destaqueVermelho = new Set();
    let saveTimeout = null;
    let clickTimers = {}; // para gerenciar cliques simples/duplos

    function gerarId() { return 'f'+Date.now()+Math.random().toString(36).substr(2,7); }
    function salvar() { localStorage.setItem(STORAGE_KEY, JSON.stringify(escalas)); }
    function getEscalaAtiva() { return escalas[escalaAtiva]?.funcionarios || []; }
    function getTituloAtivo() { return escalas[escalaAtiva]?.titulo || 'Escala'; }
    function getEmojiAtivo() { return escalas[escalaAtiva]?.emoji || '📅'; }
    function getTemaAtivo() { return escalas[escalaAtiva]?.tema || 'preto'; }
    function getAnotacaoAtiva() { return escalas[escalaAtiva]?.anotacao || ''; }
    function escHtml(str) { var d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

    function getCorDia() { return CORES_TEMA[getTemaAtivo()] || CORES_TEMA['preto']; }

    function normalizarDias(dias) {
        var obj = {};
        DIAS.forEach(d => {
            var val = dias && dias[d];
            if (val && typeof val.tipo === 'string') {
                obj[d] = { tipo: val.tipo };
            } else if (val && val.folga === true) {
                obj[d] = { tipo: 'folga' };
            } else {
                obj[d] = { tipo: 'normal' };
            }
        });
        return obj;
    }

    function pascoa(ano) { var a=ano%19,b=Math.floor(ano/100),c=ano%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1; return new Date(ano,month-1,day); }
    function segundoDomingo(mes, ano) { var d=new Date(ano,mes-1,1); var diaSemana=d.getDay(); var diasAteDomingo=diaSemana===0?0:7-diaSemana; var segundoDom=1+diasAteDomingo+7; return segundoDom; }

    function gerarFeriados(ano) {
        var p=pascoa(ano),c=new Date(p); c.setDate(c.getDate()-47);
        var corpus=new Date(p); corpus.setDate(corpus.getDate()+60);
        var carnavalTerca = c.getDate();
        var carnavalMes = c.getMonth()+1;
        var carnavalSabado = new Date(c); carnavalSabado.setDate(c.getDate()-3);
        var carnavalSegunda = new Date(c); carnavalSegunda.setDate(c.getDate()-1);
        return [
            {dia:1,mes:1,nome:'Confraternização Universal',tipo:'feriado'},
            {dia:21,mes:4,nome:'Tiradentes',tipo:'feriado'},

        ];

    function gerarDatasComemorativas(ano) {
        var diaMaes = segundoDomingo(5, ano);
        var diaPais = segundoDomingo(8, ano);
        return [
            {dia:diaMaes,mes:5,nome:'Dia das Mães',tipo:'comemorativa'},
            {dia:12,mes:6,nome:'Dia dos Namorados',tipo:'comemorativa'},
            {dia:20,mes:7,nome:'Dia do Amigo',tipo:'comemorativa'},
            {dia:diaPais,mes:8,nome:'Dia dos Pais',tipo:'comemorativa'},
            {dia:15,mes:10,nome:'Dia do Professor',tipo:'comemorativa'},
            {dia:28,mes:10,nome:'Dia do Servidor Público',tipo:'comemorativa'},
            {dia:31,mes:10,nome:'Halloween',tipo:'comemorativa'},
            {dia:24,mes:6,nome:'São João',tipo:'comemorativa'},
            {dia:24,mes:12,nome:'Véspera de Natal',tipo:'comemorativa'},
            {dia:31,mes:12,nome:'Réveillon',tipo:'comemorativa'},
            {diaInicio:23,mesInicio:6,diaFim:25,mesFim:6,nome:'São João (Festa Junina)',tipo:'comemorativa'}
        ];
    }

    function obterDataEspecial(date) {
        var feriados = gerarFeriados(date.getFullYear());
        var comemorativas = gerarDatasComemorativas(date.getFullYear());
        var d = date.getDate();
        var m = date.getMonth()+1;

        var todas = feriados.concat(comemorativas);
        for (var i = 0; i < todas.length; i++) {
            var ev = todas[i];
            if (ev.diaInicio && ev.mesInicio && ev.diaFim && ev.mesFim) {
                var inicio = new Date(date.getFullYear(), ev.mesInicio-1, ev.diaInicio);
                var fim = new Date(date.getFullYear(), ev.mesFim-1, ev.diaFim);
                if (date >= inicio && date <= fim) {
                    return {nome: ev.nome, tipo: ev.tipo};
                }
            }
        }

        for (var i = 0; i < feriados.length; i++) {
            var f = feriados[i];
            if (!f.diaInicio && f.dia === d && f.mes === m) return f;
        }
        for (var i = 0; i < comemorativas.length; i++) {
            var cm = comemorativas[i];
            if (!cm.diaInicio && cm.dia === d && cm.mes === m) return cm;
        }
        return null;
    }

    function carregar() {
        try {
            var raw = localStorage.getItem(STORAGE_KEY);
            var data = raw ? JSON.parse(raw) : null;
            if (!Array.isArray(data)) throw new Error('inválido');
            while(data.length < NUM_ESCALAS) data.push({titulo:'Escala '+(data.length+1), tema:'preto', emoji:'📅', anotacao:'', funcionarios:[]});
            if(data.length > NUM_ESCALAS) data.splice(NUM_ESCALAS);
            escalas = data.map((item,i)=>({
                titulo: item.titulo || ('Escala '+(i+1)),
                tema: item.tema || 'preto',
                emoji: item.emoji || '📅',
                anotacao: item.anotacao || '',
                funcionarios: Array.isArray(item.funcionarios) ? item.funcionarios.map(f => ({
                    id: f.id,
                    nome: f.nome,
                    dias: normalizarDias(f.dias)
                })) : []
            }));
        }catch(e){ demo(); }
    }
    function demo() {
        var aD={}, cD={}, rD={};
        DIAS.forEach(d=>{ aD[d]={tipo: (d==='sab'||d==='dom') ? 'folga' : 'normal'}; cD[d]={tipo: d==='dom' ? 'folga' : 'normal'}; rD[d]={tipo: (d==='sab'||d==='dom') ? 'ferias' : 'normal'}; });
        escalas=[
            {titulo:'Setor Administrativo',tema:'azul',emoji:'📋',anotacao:'Reunião de equipe toda segunda-feira às 9h.\nNão esquecer de preencher relatório mensal.',funcionarios:[{id:gerarId(),nome:'Ana Costa',dias:aD},{id:gerarId(),nome:'Carlos Mendes',dias:cD}]},
            {titulo:'Setor de Transporte',tema:'verde',emoji:'🚚',anotacao:'',funcionarios:[{id:gerarId(),nome:'Roberto Alves',dias:rD}]},
            {titulo:'Escala 3',tema:'preto',emoji:'🍣',anotacao:'',funcionarios:[]},
            {titulo:'Escala 4',tema:'azul',emoji:'🍳',anotacao:'',funcionarios:[]},
            {titulo:'Escala 5',tema:'verde',emoji:'👨‍🍳',anotacao:'',funcionarios:[]}
        ];
        salvar();
    }

    function aplicarTema(nome) {
        var t = TEMAS[nome] || TEMAS['preto'];
        var r = document.documentElement;
        r.style.setProperty('--bg-base',t.bgBase); r.style.setProperty('--bg-sidebar',t.bgSidebar); r.style.setProperty('--bg-card',t.bgCard); r.style.setProperty('--bg-table',t.bgTable);
        r.style.setProperty('--bg-input',t.bgInput); r.style.setProperty('--color-primary',t.colorPrimary); r.style.setProperty('--gradient-primary',t.gradientPrimary);
        r.style.setProperty('--gradient-sidebar',t.gradientSidebar); r.style.setProperty('--border-active',t.borderActive); r.style.setProperty('--cell-hover-bg',t.cellHoverBg);
        r.style.setProperty('--cell-hover-border',t.cellHoverBorder); r.style.setProperty('--weekend-col-text',t.weekendColText); r.style.setProperty('--weekend-bg',t.weekendBg);
        r.style.setProperty('--weekend-header-bg',t.weekendHeaderBg); r.style.setProperty('--weekend-header-border',t.weekendHeaderBorder);
    }

    function renderizarTudo() {
        aplicarTema(getTemaAtivo());
        document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active', d.dataset.theme===getTemaAtivo()));
        renderizarSidebar();
        document.getElementById('tituloTexto').textContent = getEmojiAtivo() + ' ' + getTituloAtivo();
        renderizarAnotacao();
        renderizarTabela();
        renderizarCalendario();
        atualizarDiaCalendario();
        renderizarListaSemFolga();
    }

    function renderizarAnotacao() {
        var anotacao = getAnotacaoAtiva();
        var textarea = document.getElementById('anotacaoTextarea');
        if (textarea) {
            textarea.value = anotacao;
        }
    }

    function salvarAnotacao() {
        var textarea = document.getElementById('anotacaoTextarea');
        if (textarea) {
            escalas[escalaAtiva].anotacao = textarea.value;
            salvar();
        }
    }

    function iniciarSalvamentoAutomatico() {
        var textarea = document.getElementById('anotacaoTextarea');
        if (!textarea) return;
        textarea.addEventListener('input', function() {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(salvarAnotacao, 600);
        });
    }

    function renderizarSidebar() {
        var nav = document.getElementById('sidebarNav'); nav.innerHTML='';
        escalas.forEach((esc,i)=>{
            var btn = document.createElement('button');
            btn.className = 'nav-item' + (i===escalaAtiva?' active':'');
            btn.innerHTML = esc.emoji + ' ' + escHtml(esc.titulo) + ' <span class="badge">'+esc.funcionarios.length+'</span>';
            btn.onclick = function(){ escalaAtiva=i; renderizarTudo(); mostrarToast(esc.emoji + ' ' + getTituloAtivo()); };
            nav.appendChild(btn);
        });
    }

    function renderizarTabela() {
        var tbody = document.getElementById('corpoTabela'), vazio = document.getElementById('estadoVazio');
        var funcs = getEscalaAtiva();
        if(!funcs.length){ tbody.innerHTML=''; vazio.style.display='block'; return; }
        vazio.style.display='none';
        var corDia = getCorDia();
        tbody.innerHTML = funcs.map(f=>{
            var diasHtml = DIAS.map(dia=>{
                var d = f.dias && f.dias[dia] ? f.dias[dia] : {tipo:'normal'};
                var dataAttr = 'data-func="' + f.id + '" data-dia="' + dia + '"';
                if(d.tipo === 'folga') {
                    return '<td><div class="cell-display folga" ' + dataAttr + '><span class="cell-folga-text">FOLGA</span></div></td>';
                } else if(d.tipo === 'ferias') {
                    return '<td><div class="cell-display ferias" ' + dataAttr + '><span class="cell-ferias-text">FÉRIAS</span></div></td>';
                } else {
                    return '<td><div class="cell-display" style="background-color:' + corDia.bg + '; color:' + corDia.text + ';" ' + dataAttr + '><span class="cell-dia">'+DIAS_ABREVIADOS[dia]+'</span></div></td>';
                }
            }).join('');
            return '<tr><td>'+escHtml(f.nome)+'<button class="delete-func-btn" onclick="window.removerFunc(\''+f.id+'\')">✕</button></td>'+diasHtml+'</tr>';
        }).join('');
        // Reaplicar eventos de clique nas células
        setupCellClickEvents();
    }

    function setupCellClickEvents() {
        var tbody = document.getElementById('corpoTabela');
        if (!tbody) return;
        // Remove listeners anteriores para evitar duplicação
        tbody.removeEventListener('click', handleCellClick);
        tbody.removeEventListener('dblclick', handleCellDoubleClick);
        tbody.addEventListener('click', handleCellClick);
        tbody.addEventListener('dblclick', handleCellDoubleClick);
    }

    function handleCellClick(e) {
        var cell = e.target.closest('.cell-display');
        if (!cell) return;
        var funcId = cell.getAttribute('data-func');
        var dia = cell.getAttribute('data-dia');
        if (!funcId || !dia) return;
        // Se já existe um timer pendente para este elemento, cancela (será tratado como duplo clique)
        var key = funcId + '|' + dia;
        if (clickTimers[key]) {
            clearTimeout(clickTimers[key]);
            delete clickTimers[key];
            // Não faz nada, o dblclick já foi ou será tratado
            return;
        }
        // Agenda a ação de clique simples (folga)
        clickTimers[key] = setTimeout(function() {
            delete clickTimers[key];
            aplicarFolga(funcId, dia);
        }, 300); // 300ms de espera
    }

    function handleCellDoubleClick(e) {
        var cell = e.target.closest('.cell-display');
        if (!cell) return;
        var funcId = cell.getAttribute('data-func');
        var dia = cell.getAttribute('data-dia');
        if (!funcId || !dia) return;
        var key = funcId + '|' + dia;
        // Cancela qualquer timer de clique simples pendente
        if (clickTimers[key]) {
            clearTimeout(clickTimers[key]);
            delete clickTimers[key];
        }
        // Executa ação de duplo clique (férias)
        aplicarFerias(funcId, dia);
    }

    function aplicarFolga(funcId, dia) {
        var func = getEscalaAtiva().find(f=>f.id===funcId);
        if (!func) return;
        if (!func.dias) func.dias = {};
        var atual = func.dias[dia] ? func.dias[dia].tipo : 'normal';
        if (atual === 'normal') {
            func.dias[dia] = {tipo: 'folga'};
            mostrarToast('🏖️ Folga marcada!');
        } else if (atual === 'folga') {
            func.dias[dia] = {tipo: 'normal'};
            mostrarToast('🔄 Folga removida!');
        } else if (atual === 'ferias') {
            func.dias[dia] = {tipo: 'normal'};
            mostrarToast('🔄 Férias removidas!');
        }
        salvar();
        renderizarTudo();
    }

    function aplicarFerias(funcId, dia) {
        var func = getEscalaAtiva().find(f=>f.id===funcId);
        if (!func) return;
        if (!func.dias) func.dias = {};
        var atual = func.dias[dia] ? func.dias[dia].tipo : 'normal';
        if (atual === 'ferias') {
            func.dias[dia] = {tipo: 'normal'};
            mostrarToast('🔄 Férias removidas!');
        } else {
            func.dias[dia] = {tipo: 'ferias'};
            mostrarToast('✈️ Férias marcadas!');
        }
        salvar();
        renderizarTudo();
    }

    window.toggleFolga = function(funcId, dia) {
        // Mantido para compatibilidade, mas não utilizado na interface agora
        aplicarFolga(funcId, dia);
    };

    function renderizarListaDia() {
        var container = document.getElementById('listaFuncionariosDia'), dia = diaSelecionadoLista;
        var trabalhando = getEscalaAtiva().filter(f=>{
            var d = f.dias && f.dias[dia] ? f.dias[dia] : {tipo:'normal'};
            return d.tipo === 'normal';
        });
        container.innerHTML = trabalhando.length ? trabalhando.map(f=>'<div class="funcionario-dia-item">'+escHtml(f.nome)+'</div>').join('') : '<div class="nenhum-funcionario">Nenhum funcionário na casa</div>';
    }

    function renderizarListaSemFolga() {
        var container = document.getElementById('listaFuncionariosSemFolga');
        var semFolga = getEscalaAtiva().filter(f=>{
            return !DIAS.some(d=>{
                var dd = f.dias && f.dias[d] ? f.dias[d] : {tipo:'normal'};
                return dd.tipo === 'folga' || dd.tipo === 'ferias';
            });
        });
        if(!semFolga.length){ container.innerHTML='<div class="nenhum-funcionario">Todos têm folga ou férias</div>'; return; }
        container.innerHTML = semFolga.map(f=>'<div class="funcionario-sem-folga-item'+(destaqueVermelho.has(f.id)?' destacado-vermelho':'')+'" data-id="'+f.id+'">'+escHtml(f.nome)+'</div>').join('');
        container.querySelectorAll('.funcionario-sem-folga-item').forEach(el=>{
            el.addEventListener('dblclick', function(e){ e.stopPropagation(); var id=this.dataset.id; destaqueVermelho.has(id)?destaqueVermelho.delete(id):destaqueVermelho.add(id); this.classList.toggle('destacado-vermelho'); });
        });
    }

    function renderizarCalendario() {
        var grid=document.getElementById('calendarGrid'), my=document.getElementById('calendarMonthYear');
        if(!grid||!my) return;
        var y=currentYear, m=currentMonth;
        var firstDay=new Date(y,m,1).getDay(), daysInMonth=new Date(y,m+1,0).getDate();
        var today=new Date(), todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
        var selStr=selectedDate.getFullYear()+'-'+String(selectedDate.getMonth()+1).padStart(2,'0')+'-'+String(selectedDate.getDate()).padStart(2,'0');
        my.textContent = MESES[m]+' '+y;
        grid.innerHTML='';
        ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d=>{ var div=document.createElement('div'); div.className='calendar-day-name'; div.textContent=d; grid.appendChild(div); });
        var prevDays=new Date(y,m,0).getDate();
        for(var i=firstDay-1;i>=0;i--){ var div=document.createElement('div'); div.className='calendar-day other-month'; div.textContent=prevDays-i; grid.appendChild(div); }
        for(let day=1;day<=daysInMonth;day++){
            let date=new Date(y,m,day), dateStr=y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
            let especial=obterDataEspecial(date), div=document.createElement('div'); div.className='calendar-day'; div.textContent=day;
            if(dateStr===todayStr) div.classList.add('today');
            if(dateStr===selStr) div.classList.add('selected');
            if(especial){
                if(especial.tipo==='feriado') div.classList.add('feriado');
                else if(especial.tipo==='comemorativa') div.classList.add('comemorativa');
                div.title=especial.nome;
            }
            div.addEventListener('click',function(){ selectedDate=new Date(y,m,day); renderizarTudo(); });
            grid.appendChild(div);
        }
        var total=firstDay+daysInMonth, rem=7-(total%7);
        if(rem<7) for(var i=1;i<=rem;i++){ var div=document.createElement('div'); div.className='calendar-day other-month'; div.textContent=i; grid.appendChild(div); }
        var espSel=obterDataEspecial(selectedDate);
        var fi=document.getElementById('feriadoInfo'), ci=document.getElementById('comemorativaInfo');
        if(fi) fi.textContent = (espSel && espSel.tipo==='feriado') ? '🏖️ '+espSel.nome : '';
        if(ci) ci.textContent = (espSel && espSel.tipo==='comemorativa') ? '🎉 '+espSel.nome : '';
    }
    function atualizarDiaCalendario(){
        var ds=DIAS[selectedDate.getDay()===0?6:selectedDate.getDay()-1]; diaSelecionadoLista=ds;
        document.getElementById('diaSelecionado').value=ds;
        document.getElementById('diaSemanaIndicador').textContent=NOMES_DIAS[selectedDate.getDay()];
        renderizarListaDia();
    }
    function navegarMes(delta){ currentMonth+=delta; if(currentMonth>11){currentMonth=0;currentYear++;} else if(currentMonth<0){currentMonth=11;currentYear--;} renderizarTudo(); }
    document.getElementById('prevMonthBtn').addEventListener('click',function(){ navegarMes(-1); });
    document.getElementById('nextMonthBtn').addEventListener('click',function(){ navegarMes(1); });

    window.atualizarListaDia = function(){ diaSelecionadoLista=document.getElementById('diaSelecionado').value; renderizarListaDia(); };
    window.limparDestaquesVermelhos = function(){ destaqueVermelho.clear(); renderizarListaSemFolga(); mostrarToast('🧹 Destaques removidos!'); };
    window.abrirModalAdicionar = function(){
        var modal=document.getElementById('modalAdicionar'); if(!modal) return;
        document.getElementById('inputNome').value='';
        if(modal.showModal) modal.showModal(); else modal.setAttribute('open','true');
        setTimeout(function(){ document.getElementById('inputNome').focus(); },120);
    };
    window.fecharModalAdicionar = function(){ var m=document.getElementById('modalAdicionar'); if(m){ if(m.close)m.close(); else m.removeAttribute('open'); } };
    window.adicionarFuncionario = function(){
        var nome=document.getElementById('inputNome').value.trim();
        if(!nome){ mostrarToast('⚠️ Informe o nome.'); return; }
        var dias={}; DIAS.forEach(d=>{ dias[d]={tipo:'normal'}; });
        getEscalaAtiva().push({id:gerarId(),nome,dias});
        salvar(); renderizarTudo(); fecharModalAdicionar(); mostrarToast('✅ Funcionário adicionado!');
    };
    window.limparEscalaAtual = function(){
        if(!confirm('Limpar todos os funcionários de "'+getTituloAtivo()+'"?')) return;
        getEscalaAtiva().forEach(f=>destaqueVermelho.delete(f.id));
        escalas[escalaAtiva].funcionarios=[]; salvar(); renderizarTudo(); mostrarToast('🧹 Escala limpa.');
    };
    window.limparTodasFolgas = function(){
        if(!confirm('Remover todas as folgas e férias de "'+getTituloAtivo()+'"?')) return;
        getEscalaAtiva().forEach(f=>{
            if(!f.dias) f.dias={};
            DIAS.forEach(d=>{ f.dias[d] = {tipo:'normal'}; });
        });
        salvar(); renderizarTudo(); mostrarToast('🔄 Todas as folgas e férias removidas!');
    };

    window.abrirModalEditarEscala = function(){
        var modal = document.getElementById('modalEditarEscala');
        if(!modal) return;
        document.getElementById('inputEscalaNome').value = getTituloAtivo();
        document.getElementById('inputEscalaEmoji').value = getEmojiAtivo();
        if(modal.showModal) modal.showModal(); else modal.setAttribute('open','true');
        setTimeout(function(){ document.getElementById('inputEscalaNome').focus(); },120);
    };
    window.fecharModalEditarEscala = function(){
        var m = document.getElementById('modalEditarEscala');
        if(m){ if(m.close)m.close(); else m.removeAttribute('open'); }
    };
    window.salvarEdicaoEscala = function(){
        var nome = document.getElementById('inputEscalaNome').value.trim();
        var emoji = document.getElementById('inputEscalaEmoji').value.trim() || '📅';
        if(!nome){ mostrarToast('⚠️ Informe o nome da escala.'); return; }
        escalas[escalaAtiva].titulo = nome;
        escalas[escalaAtiva].emoji = emoji;
        salvar(); renderizarTudo(); fecharModalEditarEscala(); mostrarToast('✏️ Escala atualizada!');
    };

    window.removerFunc = function(funcId){
        if(!confirm('Remover este funcionário?')) return;
        escalas[escalaAtiva].funcionarios = getEscalaAtiva().filter(f=>f.id!==funcId);
        destaqueVermelho.delete(funcId); salvar(); renderizarTudo(); mostrarToast('🗑️ Funcionário removido.');
    };
    function mostrarToast(msg){
        var t=document.getElementById('toast'); if(!t) return;
        t.textContent=msg; t.classList.add('show'); clearTimeout(t._timeout);
        t._timeout=setTimeout(function(){t.classList.remove('show');},2600);
    }

    document.querySelectorAll('.theme-dot').forEach(dot=>{
        dot.addEventListener('click', function(){
            var novoTema = this.dataset.theme;
            if(novoTema && novoTema!==getTemaAtivo()){
                escalas[escalaAtiva].tema = novoTema;
                salvar(); aplicarTema(novoTema);
                document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active', d.dataset.theme===novoTema));
                mostrarToast('🎨 Tema alterado para '+novoTema+'!');
                renderizarTudo();
            }
        });
    });

    document.getElementById('modalAdicionar').addEventListener('click', function(e){ if(e.target===this) fecharModalAdicionar(); });
    document.getElementById('modalEditarEscala').addEventListener('click', function(e){ if(e.target===this) fecharModalEditarEscala(); });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            var modalAdicionar = document.getElementById('modalAdicionar');
            var modalEditar = document.getElementById('modalEditarEscala');
            if (modalEditar && (modalEditar.hasAttribute('open') || modalEditar.open)) {
                return;
            }
            if (modalAdicionar && (modalAdicionar.hasAttribute('open') || modalAdicionar.open)) {
                e.preventDefault();
                window.adicionarFuncionario();
            } else {
                var active = document.activeElement;
                if (!active || (active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA')) {
                    e.preventDefault();
                    window.abrirModalAdicionar();
                }
            }
        }
    });

    carregar();
    selectedDate = new Date(); currentMonth = selectedDate.getMonth(); currentYear = selectedDate.getFullYear();
    renderizarTudo();
    iniciarSalvamentoAutomatico();
})();
</script>
